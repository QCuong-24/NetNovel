spring.application.name=${SPRING_APPLICATION_NAME:netnovel-server}

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/netnovel}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:netnovel}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:netnovel}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

app.jwt.secret=${APP_JWT_SECRET:change-this-secret-before-deploying-netnovel}
app.jwt.access-token-expiration-seconds=${APP_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
app.jwt.refresh-token-expiration-seconds=${APP_JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:2592000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:netnovel}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:netnovel}

app.crawl.rabbit.exchange=${APP_CRAWL_RABBIT_EXCHANGE:netnovel.crawl}
app.crawl.rabbit.novel-request-queue=${APP_CRAWL_RABBIT_NOVEL_REQUEST_QUEUE:crawl.novel.request}
app.crawl.rabbit.novel-request-routing-key=${APP_CRAWL_RABBIT_NOVEL_REQUEST_ROUTING_KEY:crawl.novel.request}

app.search.elastic.enabled=${ELASTIC_SEARCH_ENABLED:false}
app.search.elastic.url=${ELASTIC_SEARCH_URL:http://localhost:9200}
app.search.elastic.novel-index=${ELASTIC_SEARCH_NOVEL_INDEX:netnovel_novels}

app.novel.embedding.enabled=${NOVEL_EMBEDDING_ENABLED:false}
app.novel.embedding.base-url=${NOVEL_EMBEDDING_BASE_URL:${EMBEDDING_BASE_URL:http://localhost:8000}}
app.novel.embedding.model=${NOVEL_EMBEDDING_MODEL:${EMBEDDING_MODEL:intfloat/multilingual-e5-small}}
app.novel.embedding.dimension=${NOVEL_EMBEDDING_DIMENSION:384}
app.novel.embedding.reindex-batch-size=${NOVEL_EMBEDDING_REINDEX_BATCH_SIZE:16}
app.novel.embedding.top-k=${NOVEL_EMBEDDING_TOP_K:10}
app.novel.embedding.min-similarity=${NOVEL_EMBEDDING_MIN_SIMILARITY:0.0}
app.novel.embedding.fail-on-index-error=${NOVEL_EMBEDDING_FAIL_ON_INDEX_ERROR:false}

logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${LOGGING_LEVEL_HIBERNATE_BIND:WARN}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

app.chatbot.embedding.enabled=${CHATBOT_EMBEDDING_ENABLED:false}
app.chatbot.embedding.base-url=${EMBEDDING_BASE_URL:http://localhost:8000}
app.chatbot.embedding.model=${EMBEDDING_MODEL:intfloat/multilingual-e5-small}
app.chatbot.embedding.dimension=${CHATBOT_EMBEDDING_DIMENSION:384}
app.chatbot.embedding.top-k=${CHATBOT_EMBEDDING_TOP_K:5}
app.chatbot.embedding.min-similarity=${CHATBOT_EMBEDDING_MIN_SIMILARITY:0.82}
app.chatbot.embedding.reindex-batch-size=${CHATBOT_EMBEDDING_REINDEX_BATCH_SIZE:16}

 
