services:
  postgres:
    image: postgres:16-alpine
    container_name: netnovel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netnovel}
      POSTGRES_USER: ${POSTGRES_USER:-netnovel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netnovel}
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    command: postgres -c timezone=Asia/Ho_Chi_Minh
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netnovel} -d ${POSTGRES_DB:-netnovel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: netnovel-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-netnovel}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-netnovel}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: netnovel-elasticsearch
    restart: unless-stopped
    #profiles:
    #  - search
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netnovel-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-netnovel}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-netnovel}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-netnovel}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-secret-before-deploying-netnovel}
      APP_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-1800}
      APP_JWT_REFRESH_TOKEN_EXPIRATION_SECONDS: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:-2592000}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AUDIO_STORAGE_TYPE: ${AUDIO_STORAGE_TYPE:-LOCAL}
      AUDIO_STORAGE_PATH: ${AUDIO_STORAGE_PATH:-storage/audio}
      AUDIO_DEFAULT_LANGUAGE_CODE: ${AUDIO_DEFAULT_LANGUAGE_CODE:-en-US}
      AUDIO_DEFAULT_VOICE_NAME: ${AUDIO_DEFAULT_VOICE_NAME:-Joanna}
      AUDIO_DEFAULT_ENGINE: ${AUDIO_DEFAULT_ENGINE:-neural}
      AUDIO_DEFAULT_SPEAKING_RATE: ${AUDIO_DEFAULT_SPEAKING_RATE:-1.00}
      AUDIO_DEFAULT_PITCH: ${AUDIO_DEFAULT_PITCH:-0.00}
      AUDIO_DEFAULT_AUDIO_ENCODING: ${AUDIO_DEFAULT_AUDIO_ENCODING:-MP3}
      AUDIO_MAX_CHUNK_CHARACTERS: ${AUDIO_MAX_CHUNK_CHARACTERS:-2800}
      AUDIO_MAX_TOTAL_CHARACTERS: ${AUDIO_MAX_TOTAL_CHARACTERS:-50000}
      AUDIO_USER_MONTHLY_CHARACTER_QUOTA: ${AUDIO_USER_MONTHLY_CHARACTER_QUOTA:-100000}
      AUDIO_MANAGER_MONTHLY_CHARACTER_QUOTA: ${AUDIO_MANAGER_MONTHLY_CHARACTER_QUOTA:-1000000}
      AUDIO_ADMIN_MONTHLY_CHARACTER_QUOTA: ${AUDIO_ADMIN_MONTHLY_CHARACTER_QUOTA:--1}
      AUDIO_CACHE_TTL_DAYS: ${AUDIO_CACHE_TTL_DAYS:-30}
      APP_AUDIO_RABBIT_EXCHANGE: ${APP_AUDIO_RABBIT_EXCHANGE:-netnovel.audio}
      APP_AUDIO_RABBIT_GENERATION_QUEUE: ${APP_AUDIO_RABBIT_GENERATION_QUEUE:-audio.generation}
      APP_AUDIO_RABBIT_GENERATION_ROUTING_KEY: ${APP_AUDIO_RABBIT_GENERATION_ROUTING_KEY:-audio.generation}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-netnovel}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-netnovel}
      APP_CRAWL_RABBIT_EXCHANGE: ${APP_CRAWL_RABBIT_EXCHANGE:-netnovel.crawl}
      APP_CRAWL_RABBIT_NOVEL_REQUEST_QUEUE: ${APP_CRAWL_RABBIT_NOVEL_REQUEST_QUEUE:-crawl.novel.request}
      APP_CRAWL_RABBIT_NOVEL_REQUEST_ROUTING_KEY: ${APP_CRAWL_RABBIT_NOVEL_REQUEST_ROUTING_KEY:-crawl.novel.request}
      ELASTIC_SEARCH_ENABLED: ${ELASTIC_SEARCH_ENABLED:-false}
      ELASTIC_SEARCH_URL: ${ELASTIC_SEARCH_URL:-http://elasticsearch:9200}
      ELASTIC_SEARCH_NOVEL_INDEX: ${ELASTIC_SEARCH_NOVEL_INDEX:-netnovel_novels}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - server_audio_storage:/app/storage/audio

  crawler:
    build:
      context: ../netnovel-crawler
      dockerfile: Dockerfile
    container_name: netnovel-crawler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-netnovel}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-netnovel}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-netnovel}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-netnovel}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-netnovel}
      APP_CRAWL_RABBIT_EXCHANGE: ${APP_CRAWL_RABBIT_EXCHANGE:-netnovel.crawl}
      APP_CRAWL_RABBIT_NOVEL_REQUEST_QUEUE: ${APP_CRAWL_RABBIT_NOVEL_REQUEST_QUEUE:-crawl.novel.request}
      APP_CRAWL_RABBIT_NOVEL_REQUEST_ROUTING_KEY: ${APP_CRAWL_RABBIT_NOVEL_REQUEST_ROUTING_KEY:-crawl.novel.request}
      APP_CRAWLER_SUPPORTED_SOURCES: ${APP_CRAWLER_SUPPORTED_SOURCES:-}
      APP_CRAWLER_PENDING_RECOVERY_ENABLED: ${APP_CRAWLER_PENDING_RECOVERY_ENABLED:-true}
      APP_CRAWLER_PENDING_RECOVERY_DELAY_MS: ${APP_CRAWLER_PENDING_RECOVERY_DELAY_MS:-60000}
      APP_CRAWLER_PENDING_RECOVERY_INITIAL_DELAY_MS: ${APP_CRAWLER_PENDING_RECOVERY_INITIAL_DELAY_MS:-30000}

volumes:
  postgres_data:
  rabbitmq_data:
  elasticsearch_data:
  server_audio_storage:
