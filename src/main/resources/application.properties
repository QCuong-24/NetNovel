spring.application.name=${SPRING_APPLICATION_NAME:netnovel-crawler}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/netnovel}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:netnovel}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:netnovel}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:netnovel}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:netnovel}

app.crawl.rabbit.exchange=${APP_CRAWL_RABBIT_EXCHANGE:netnovel.crawl}
app.crawl.rabbit.novel-request-queue=${APP_CRAWL_RABBIT_NOVEL_REQUEST_QUEUE:crawl.novel.request}
app.crawl.rabbit.novel-request-routing-key=${APP_CRAWL_RABBIT_NOVEL_REQUEST_ROUTING_KEY:crawl.novel.request}

# Format: sourceName|domain|JSOUP;sourceName2|domain2|PLAYWRIGHT
app.crawler.supported-sources=${APP_CRAWLER_SUPPORTED_SOURCES:}
app.crawler.wuxiaworld.title-selector=${APP_CRAWLER_WUXIAWORLD_TITLE_SELECTOR:h5.mantine-Text-root.mantine-Title-root.mantine-1ra9ysm}
app.crawler.wuxiaworld.author-selector=${APP_CRAWLER_WUXIAWORLD_AUTHOR_SELECTOR:div.mantine-Text-root.mantine-ss2azu}
app.crawler.wuxiaworld.description-selector=${APP_CRAWLER_WUXIAWORLD_DESCRIPTION_SELECTOR:div.mantine-Text-root.mantine-tpna8b}
app.crawler.wuxiaworld.total-chapters-selector=${APP_CRAWLER_WUXIAWORLD_TOTAL_CHAPTERS_SELECTOR:div.mantine-Text-root.mantine-19n0k2t}
app.crawler.wuxiaworld.chapter-content-selector=${APP_CRAWLER_WUXIAWORLD_CHAPTER_CONTENT_SELECTOR:div#chapterText.mantine-Text-root .mantine-1ekvxsp}

logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${LOGGING_LEVEL_HIBERNATE_BIND:WARN}
